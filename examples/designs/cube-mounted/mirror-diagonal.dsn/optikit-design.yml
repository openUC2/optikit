optikit-version: v0.0.0-alpha.1

design:
  description: A diagonal mirror mounted in a cube
  tags:
    - cube-mounted
    - mirror
    - mirror/single-sided
    - mirror/flat
    - in/core-box

components:
  skeleton:
    type: design
    design: ./primitives/cube-skeleton.dsn
    pose:
      rotation:
        type: grid
  mounted-mirror:
    type: primitive
    model: SUB - 0022 - MIR45TH2 - virt ass.stp
    pose:
      rotation:
        type: grid

variants:
  xy:
    description: Normal vector of mirror surface in the x-y plane
  _z:
    description: Normal vector of mirror surface in the y-z plane
    components:
      mounted-mirror:
        pose:
          rotation:
            grid: {z: +y}
