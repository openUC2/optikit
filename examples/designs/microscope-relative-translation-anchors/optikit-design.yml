optikit-version: v0.0.0-alpha.1

design:
  description: A minimal 2-D microscope consisting of components whose positions are specified relative to each other.
  tags:
    - instrument
    - instrument/microscope

components:
  light-source:
    type: design
    design: /subdesigns/flashlight
    pose:
      rotation:
        type: grid
        grid: {z: +x, x: -z}
      translation:
        anchor: sample-holder
        offset-cm: {x: -8}
  sample-holder:
    type: design
    design: /subdesigns/mounted-slide-holder
    pose:
      rotation:
        type: uc2
        grid: {x: -y}
  objective-lens:
    type: design
    design: /subdesigns/mounted-lens
    pose:
      rotation:
        type: uc2
        grid: {x: -y}
      translation:
        anchor: sample-holder
        offset-grid: {x: 1}
  periscope-mirror-1:
    type: design
    design: /subdesigns/mounted-diagonal-mirror
    pose:
      rotation:
        type: uc2
      translation:
        anchor: objective-lens
        offset-grid: {x: 1}
  periscope-mirror-2:
    type: design
    design: /subdesigns/mounted-diagonal-mirror
    pose:
      rotation:
        type: uc2
        grid: {x: -x}
      translation:
        anchor: periscope-mirror-1
        offset-grid: {y: 10}
  tube-lens:
    type: design
    design: /subdesigns/mounted-lens
    pose:
      rotation:
        type: uc2
        grid: {x: -y}
      translation:
        anchor: periscope-mirror-2
        offset-grid: {x: 3}
  projector-screen:
    type: design
    design: /subdesigns/projector-screen
    pose:
      rotation:
        type: grid
        grid: {z: -x, x: +z}
      translation:
        anchor: tube-lens
        offset-cm: {x: 10}

relations:
  geometry:
  logic:
