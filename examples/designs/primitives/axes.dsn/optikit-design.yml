optikit-version: v0.0.0-alpha.1

design:
  description: A set of x-y-z coordinate axes

components:
  step:
    type: primitive
    primitive:
      type: step
      model: axes.step
    pose:
      rotation:
        type: grid

variants:
  ZposXpos:
    description: Grid rotation with component's z-axis in +z direction, x-axis in +x direction
    components:
      step:
        pose:
          rotation:
            grid: {z: +z, x: +x}
  ZposYpos:
    description: Grid rotation with component's z-axis in +z direction, x-axis in +y direction
    components:
      step:
        pose:
          rotation:
            grid: {z: +z, x: +y}
  ZposXneg:
    description: Grid rotation with component's z-axis in +z direction, x-axis in -x direction
    components:
      step:
        pose:
          rotation:
            grid: {z: +z, x: -x}
  ZposYneg:
    description: Grid rotation with component's z-axis in +z direction, x-axis in -y direction
    components:
      step:
        pose:
          rotation:
            grid: {z: +z, x: -y}
  ZnegXpos:
    description: Grid rotation with component's z-axis in -z direction, x-axis in +x direction
    components:
      step:
        pose:
          rotation:
            grid: {z: -z, x: +x}
  ZnegYpos:
    description: Grid rotation with component's z-axis in -z direction, x-axis in +y direction
    components:
      step:
        pose:
