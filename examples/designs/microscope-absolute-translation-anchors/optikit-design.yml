optikit-version: v0.0.0-alpha.1

design:
  description: A minimal 2-D microscope consisting of components whose positions are specified relative to the overall design.
  tags:
    - instrument
    - instrument/microscope

components:
  light-source:
    type: design
    design: /subdesigns/flashlight
    pose:
      rotation:
        type: grid
        grid: {z: +x, x: -z}
      translation:
        offset-cm: {x: -8}
  sample-holder:
    type: design
    design: /subdesigns/mounted-slide-holder
    instantiation:
      variant: x
    pose:
      rotation:
        type: uc2
        grid: {x: -y}
  objective-lens:
    type: design
    design: /subdesigns/mounted-lens
    instantiation:
      variant: x
    pose:
      rotation:
        type: uc2
        grid: {x: -y}
      translation:
        offset-grid: {x: 1}
  periscope-mirror-1:
    type: design
    design: /subdesigns/mounted-diagonal-mirror
    instantiation:
      variant: xy
    pose:
      rotation:
        type: uc2
      translation:
        offset-grid: {x: 2}
  periscope-mirror-2:
    type: design
    design: /subdesigns/mounted-diagonal-mirror
    instantiation:
      variant: xy
    pose:
      rotation:
        type: uc2
        grid: {x: -x}
      translation:
        offset-grid: {x: 2, y: 10}
  tube-lens:
    type: design
    design: /subdesigns/mounted-lens
    instantiation:
      variant: x
    pose:
      rotation:
        type: uc2
        grid: {x: -y}
      translation:
        offset-grid: {x: 5, y: 10}
  projector-screen:
    type: design
    design: /subdesigns/projector-screen
    pose:
      rotation:
        type: grid
        grid: {z: -x, x: +z}
      translation:
        offset-grid: {x: 5, y: 10}
        offset-cm: {x: 10}

relations:
  geometry:
  logic:
