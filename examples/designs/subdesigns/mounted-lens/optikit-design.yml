optikit-version: v0.0.0-alpha.1

design:
  description: A lens mounted in a cube
  tags:
    - cube-mounted
    - lens
    - lens/convex

components:
  skeleton:
    type: design
    design: ./subdesigns/cube-skeleton

variants:
    z:
      description: Normal vector of lens is z-axis
      components:
        insert:
          type: primitive
          model: SUB - 0023 - LEND40F50 - V04 - virt ass.stp
        pose:
          rotation:
            type: grid
    y:
      description: Normal vector of lens is y-axis; position is discretized.
      components:
        insert:
          type: primitive
          model: SUB - 0023 - LEND40F50 - V04 - virt ass.stp
        pose:
          rotation:
            type: grid
            grid: {z: +y}
    x:
      description: Normal vector of lens is x-axis
      components:
        insert:
          type: primitive
          model: SUB - 0023 - LEND40F50 - V04 - virt ass.stp
        pose:
          rotation:
            type: grid
            grid: {z: +x, x: -z}
