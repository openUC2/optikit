optikit-version: v0.0.0-alpha.1

design:
  description: A microscope slide holder mounted in a cube
  tags:
    - sample-holder

components:
  skeleton:
    type: design
    design: ./subdesigns/cube-skeleton

variants:
  z:
    description: Normal vector of the sample slide is the z-axis
    components:
      insert:
        type: primitive
        model: SUB - 0027 - SAMHOL - V04 - virt ass.stp
        pose:
          rotation:
            type: grid
  y:
    description: Normal vector of the sample slide is the y-axis
    components:
      insert:
        type: primitive
        model: SUB - 0027 - SAMHOL - V04 - virt ass.stp
        pose:
          rotation:
            type: grid
            grid: {z: +y, x: -z}
  x:
    description: Normal vector of the sample slide is the x-axis
    components:
      insert:
        type: primitive
        model: SUB - 0027 - SAMHOL - V04 - virt ass.stp
        pose:
          rotation:
            type: grid
            grid: {z: +x, x: -z}
