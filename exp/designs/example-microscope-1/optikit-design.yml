optikit-version: v0.0.0-alpha.1

design:
  description: A minimal 2-D microscope
  tags:
    - instrument
    - instrument/microscope

components:
  light-source:
    type: design
    design: /subdesigns/flashlight
    geometry:
      position:
        anchor: sample-holder
        units: cm
        offset: {x: -8}
  sample-holder:
    type: design
    design: /subdesigns/mounted-slide-holder
  objective-lens:
    type: design
    design: /subdesigns/mounted-lens
    geometry:
      position:
        anchor: sample-holder
        offset: {x: 1}
  periscope-mirror-1:
    type: design
    design: /subdesigns/mounted-diagonal-mirror
    geometry:
      position:
        anchor: objective-lens
        offset: {x: 1}
  periscope-mirror-2:
    type: design
    design: /subdesigns/mounted-diagonal-mirror
    geometry:
      position:
        anchor: periscope-mirror-1
        offset: {y: 10}
  tube-lens:
    type: design
    design: /subdesigns/mounted-lens
    geometry:
      position:
        anchor: periscope-mirror-2
        offset: {x: 3}
  projector-screen:
    type: design
    design: /subdesigns/projector-screen
    geometry:
      position:
        anchor: tube-lens
        units: cm
        offset: {x: 10}

relations:
  geometry:
  logic:
